<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - My Blog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #667eea;
      --primary-dark: #5a67d8;
      --danger: #e53e3e;
      --success: #38a169;
      --bg: #f7fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #2d3748;
      --text-light: #718096;
      --sidebar-width: 220px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* ── 登录页 ── */
    #login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      background: white; border-radius: 16px; padding: 48px 40px; width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-card h1 { text-align: center; margin-bottom: 8px; font-size: 1.6rem; }
    .login-card p { text-align: center; color: var(--text-light); margin-bottom: 32px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-light); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-primary { background: var(--primary); color: white; width: 100%; padding: 12px; font-size: 15px; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 6px; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #c53030; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #2f855a; }
    .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }
    .btn-outline:hover { background: var(--primary); color: white; }
    #login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }

    /* ── 后台布局 ── */
    #admin-page { display: none; min-height: 100vh; flex-direction: row; }
    #admin-page.active { display: flex; }
    .sidebar {
      width: var(--sidebar-width); background: #2d3748; color: white; padding: 24px 0;
      position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100;
    }
    .sidebar-logo { padding: 0 20px 24px; font-size: 1.1rem; font-weight: 700; border-bottom: 1px solid #4a5568; }
    .sidebar-logo span { color: #a0aec0; font-size: 12px; display: block; font-weight: 400; margin-top: 4px; }
    .sidebar-menu { padding: 16px 0; }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px; padding: 12px 20px;
      cursor: pointer; transition: background .2s; font-size: 14px; color: #a0aec0;
      border: none; background: none; width: 100%; text-align: left;
    }
    .sidebar-item:hover { background: #4a5568; color: white; }
    .sidebar-item.active { background: var(--primary); color: white; }
    .sidebar-item .icon { font-size: 16px; width: 20px; }
    .sidebar-divider { border-top: 1px solid #4a5568; margin: 8px 0; }
    .sidebar-logout {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 20px;
      border-top: 1px solid #4a5568;
    }
    .sidebar-logout button { background: none; border: none; color: #a0aec0; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .sidebar-logout button:hover { color: white; }

    .admin-main { margin-left: var(--sidebar-width); flex: 1; padding: 32px; }
    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-size: 1.5rem; }
    .page-header p { color: var(--text-light); font-size: 14px; margin-top: 4px; }

    /* ── 统计卡片 ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .stat-card .stat-num { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-card .stat-label { font-size: 13px; color: var(--text-light); margin-top: 4px; }

    /* ── 标签页面板 ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 表格 ── */
    .table-card { background: var(--card); border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
    .table-toolbar { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .table-toolbar h3 { font-size: 15px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--bg); padding: 12px 16px; text-align: left; font-size: 13px; color: var(--text-light); font-weight: 600; }
    td { padding: 12px 16px; font-size: 14px; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: #f7fafc; }
    .td-actions { display: flex; gap: 8px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-blue { background: #ebf4ff; color: #2b6cb0; }
    .badge-gray { background: #edf2f7; color: var(--text-light); }
    td .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── 模态框 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 16px; width: 680px; max-width: 96vw;
      max-height: 90vh; overflow-y: auto; padding: 32px;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-header h3 { font-size: 1.1rem; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-light); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-group textarea.tall { min-height: 200px; font-family: monospace; font-size: 13px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 32px; right: 32px; background: #2d3748; color: white;
      padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 9999;
      transform: translateY(100px); opacity: 0; transition: all .3s;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--danger); }

    /* ── 网盘 ── */
    .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 20px; }
    .file-card-admin {
      background: var(--bg); border-radius: 10px; padding: 16px; display: flex;
      flex-direction: column; gap: 8px; border: 1px solid var(--border);
    }
    .file-card-admin .file-top { display: flex; align-items: center; gap: 10px; }
    .file-card-admin .file-icon { font-size: 28px; }
    .file-card-admin .file-name { font-size: 13px; font-weight: 600; word-break: break-all; }
    .file-card-admin .file-meta { font-size: 12px; color: var(--text-light); }
    .file-card-admin .file-btns { display: flex; gap: 8px; margin-top: 4px; }

    /* ── 上传区 ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 12px; padding: 32px;
      text-align: center; cursor: pointer; transition: border-color .2s; margin-bottom: 20px;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); }
    .upload-zone p { color: var(--text-light); font-size: 14px; margin-top: 8px; }
    .upload-progress { margin: 8px 20px; }

    /* ── 评论样式 ── */
    .comment-row-content { font-size: 13px; color: var(--text-light); }
    .comment-row-info { font-size: 12px; color: #a0aec0; }

    /* 响应式 */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-item span, .sidebar-logo span, .sidebar-logo div:last-child { display: none; }
      .admin-main { margin-left: 60px; padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══ 登录页 ═══ -->
<div id="login-page">
  <div class="login-card">
    <h1>🔐 后台管理</h1>
    <p>请使用管理员账号登录</p>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="login-username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">登 录</button>
    <div id="login-error">用户名或密码错误</div>
  </div>
</div>

<!-- ═══ 后台主页 ═══ -->
<div id="admin-page">
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      📝 My Blog
      <span>后台管理系统</span>
    </div>
    <nav class="sidebar-menu">
      <button class="sidebar-item active" onclick="switchTab('dashboard')">
        <span class="icon">📊</span><span>仪表盘</span>
      </button>
      <button class="sidebar-item" onclick="switchTab('posts')">
        <span class="icon">📄</span><span>文章管理</span>
      </button>
      <button class="sidebar-item" onclick="switchTab('comments')">
        <span class="icon">💬</span><span>评论管理</span>
      </button>
      <button class="sidebar-item" onclick="switchTab('storage')">
        <span class="icon">📁</span><span>网盘管理</span>
      </button>
      <div class="sidebar-divider"></div>
      <button class="sidebar-item" onclick="window.open('index.html','_blank')">
        <span class="icon">🌐</span><span>查看博客</span>
      </button>
    </nav>
    <div class="sidebar-logout">
      <button onclick="doLogout()">🚪 <span>退出登录</span></button>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="admin-main">

    <!-- 仪表盘 -->
    <div id="tab-dashboard" class="tab-panel active">
      <div class="page-header">
        <h2>仪表盘</h2>
        <p>欢迎回来，管理员</p>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="stat-posts">—</div>
          <div class="stat-label">📄 文章总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-comments">—</div>
          <div class="stat-label">💬 评论总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-files">—</div>
          <div class="stat-label">📁 文件总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-storage">—</div>
          <div class="stat-label">💾 存储占用</div>
        </div>
      </div>
      <div class="table-card">
        <div class="table-toolbar"><h3>最新文章</h3></div>
        <table>
          <thead><tr><th>标题</th><th>分类</th><th>发布时间</th></tr></thead>
          <tbody id="dashboard-posts"></tbody>
        </table>
      </div>
    </div>

    <!-- 文章管理 -->
    <div id="tab-posts" class="tab-panel">
      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <h2>文章管理</h2>
          <p>新增、编辑或删除博客文章</p>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openPostModal()">＋ 新建文章</button>
      </div>
      <div class="table-card">
        <table>
          <thead><tr><th>标题</th><th>分类</th><th>标签</th><th>发布时间</th><th>操作</th></tr></thead>
          <tbody id="posts-table"></tbody>
        </table>
      </div>
    </div>

    <!-- 评论管理 -->
    <div id="tab-comments" class="tab-panel">
      <div class="page-header">
        <h2>评论管理</h2>
        <p>查看或删除用户评论</p>
      </div>
      <div class="table-card">
        <table>
          <thead><tr><th>昵称</th><th>邮箱</th><th>评论内容</th><th>文章</th><th>时间</th><th>操作</th></tr></thead>
          <tbody id="comments-table"></tbody>
        </table>
      </div>
    </div>

    <!-- 网盘管理 -->
    <div id="tab-storage" class="tab-panel">
      <div class="page-header">
        <h2>网盘管理</h2>
        <p>上传或删除文件</p>
      </div>
      <div class="upload-zone" id="admin-upload-zone">
        <div style="font-size:40px">📤</div>
        <p>拖拽文件到此处，或 <strong style="color:var(--primary);cursor:pointer" onclick="document.getElementById('admin-file-input').click()">点击上传</strong></p>
        <input type="file" id="admin-file-input" multiple style="display:none">
      </div>
      <div id="admin-upload-progress"></div>
      <div id="admin-files-grid" class="file-grid"></div>
    </div>

  </main>
</div>

<!-- ═══ 文章编辑模态框 ═══ -->
<div class="modal-overlay" id="post-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="post-modal-title">新建文章</h3>
      <button class="modal-close" onclick="closePostModal()">✕</button>
    </div>
    <div class="form-group">
      <label>标题 *</label>
      <input type="text" id="p-title" placeholder="文章标题">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分类 *</label>
        <input type="text" id="p-category" placeholder="例：技术">
      </div>
      <div class="form-group">
        <label>标签（逗号分隔）</label>
        <input type="text" id="p-tags" placeholder="例：JavaScript, Web">
      </div>
    </div>
    <div class="form-group">
      <label>摘要</label>
      <textarea id="p-excerpt" placeholder="文章摘要（可选，自动截取正文前100字）"></textarea>
    </div>
    <div class="form-group">
      <label>正文内容（支持 HTML）</label>
      <textarea id="p-content" class="tall" placeholder="<h2>标题</h2><p>内容...</p>"></textarea>
    </div>
    <div class="form-group">
      <label>作者</label>
      <input type="text" id="p-author" placeholder="Ricky">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closePostModal()">取消</button>
      <button class="btn btn-primary" onclick="savePost()">保存文章</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
