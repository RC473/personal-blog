<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/post.css">
  <link rel="stylesheet" href="styles/responsive.css">
  <link rel="stylesheet" href="styles/comments.css">
</head>
<body>
  <div class="container">
    <!-- 导航栏 -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo"><a href="index.html">📝 My Blog</a></div>
        <ul class="nav-menu">
          <li><a href="index.html">首页</a></li>
          <li><a href="#" id="categories-link">分类</a></li>
          <li><a href="#" id="tags-link">标签</a></li>
          <li><a href="storage.html">📚 网盘</a></li>
          <li><a href="#" id="about-link">关于</a></li>
        </ul>
      </div>
    </nav>

    <!-- 文章内容 -->
    <article class="post-article">
      <div class="post-header">
        <h1 id="post-title"></h1>
        <div class="post-meta">
          <span id="post-date"></span>
          <span id="post-category"></span>
          <span id="post-author"></span>
        </div>
      </div>
      <div id="post-tags" class="post-tags"></div>
      <div id="post-content" class="post-content"></div>
    </article>

    <!-- 评论区 -->
    <section class="comments-section">
      <h2>评论 <span id="comments-count" class="comments-count-badge">0</span></h2>

      <!-- 评论表单 -->
      <div class="comment-form-card">
        <h3>发表评论</h3>
        <div id="reply-hint" class="reply-hint" style="display:none">
          ↩️ 回复中...
          <button onclick="cancelReply()" class="cancel-reply">✕ 取消回复</button>
        </div>
        <div class="comment-form-row">
          <input type="text" id="comment-nickname" placeholder="昵称 *" class="comment-input">
          <input type="email" id="comment-email" placeholder="邮箱（可选）" class="comment-input">
        </div>
        <textarea id="comment-content" placeholder="写下你的评论..." class="comment-textarea"></textarea>
        <div id="comment-form-msg" class="form-msg" style="display:none"></div>
        <button id="submit-comment-btn" class="comment-submit-btn" onclick="submitComment()">发表评论</button>
      </div>

      <!-- 评论列表 -->
      <div id="comments-list" class="comments-list"></div>
    </section>

    <!-- 相关文章 -->
    <section class="related-posts">
      <h2>相关文章</h2>
      <div id="related-posts-list" class="posts-grid"></div>
    </section>
  </div>

  <footer class="footer">
    <p>&copy; 2026 My Blog. All rights reserved.</p>
  </footer>

  <script src="js/supabase.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
