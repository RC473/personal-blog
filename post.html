<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/post.css">
    <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <a href="index.html">📝 My Blog</a>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="#" id="categories-link">分类</a></li>
                    <li><a href="#" id="tags-link">标签</a></li>
                    <li><a href="#" id="about-link">关于</a></li>
                </ul>
            </div>
        </nav>

        <!-- 文章内容 -->
        <article class="post-article">
            <div class="post-header">
                <h1 id="post-title"></h1>
                <div class="post-meta">
                    <span id="post-date"></span>
                    <span id="post-category"></span>
                </div>
            </div>
            <div id="post-tags" class="post-tags"></div>
            <div id="post-content" class="post-content"></div>
        </article>

        <!-- 评论区 -->
        <section class="comments-section">
            <h2>评论</h2>
            <div class="comment-form">
                <input type="text" id="comment-name" placeholder="你的名字" class="comment-input">
                <textarea id="comment-text" placeholder="写下你的评论..." class="comment-textarea"></textarea>
                <button id="submit-comment" class="comment-btn">发布评论</button>
            </div>
            <div id="comments-list" class="comments-list"></div>
        </section>

        <!-- 相关文章 -->
        <section class="related-posts">
            <h2>相关文章</h2>
            <div id="related-posts-list" class="posts-grid"></div>
        </section>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2026 My Blog. All rights reserved.</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/post.js"></script>
</body>
</html>
